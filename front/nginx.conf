server {
  listen 80;

  # Serve Angular app
  root /usr/share/nginx/html;
  index index.html;

  # Angular routing — redirect all unknown paths to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy to Spring Boot
  # Angular calls /api/*, Nginx strips /api and forwards to backend
  location /api/ {
    proxy_pass         http://backend:8080/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   Cookie $http_cookie;  # required for session cookies
  }

  # Serve media files directly from volume (faster than going through Spring)
  location /media/ {
    alias /var/serv-media/;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
