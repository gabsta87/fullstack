server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy all backend routes
  location /auth/ {
    proxy_pass http://backend:8080/auth/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Cookie $http_cookie;
    proxy_http_version 1.1;
  }

  location /workers/ {
    proxy_pass http://backend:8080/workers/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Cookie $http_cookie;
    proxy_http_version 1.1;
  }

  location /account/ {
    proxy_pass http://backend:8080/account/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Cookie $http_cookie;
    proxy_http_version 1.1;
  }

  location /media/ {
    alias /var/serv-media/;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Angular routing — must be last
  location / {
    try_files $uri $uri/ /index.html;
  }
}
