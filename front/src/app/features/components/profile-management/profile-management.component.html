<app-header></app-header>

<ion-content class="pm-main-container">

  <div class="pm-wrapper" *ngIf="currentUser$ | async as me ">

    <ion-grid class="pm-hero-grid ion-no-padding">
      <ion-row class="ion-align-items-center">
        <ion-col size="12" size-md="auto" class="ion-text-center">
          <div class="avatar-wrapper">
            <ion-avatar>
              <img [src]="me.mainThumbUrl || 'assets/default-avatar.png'" />
            </ion-avatar>
            <ion-fab-button size="small" class="edit-photo-btn">
              <ion-icon name="camera"></ion-icon>
            </ion-fab-button>
          </div>
        </ion-col>
        <ion-col size="12" size-md="" class="ion-text-center ion-text-md-start">
          <div class="profile-title">
            <h1>{{ me.username }}</h1>
            <ion-button [color]="me.available ? 'success' : 'medium'" class="status-badge" (click)="toggleAvailable(!me.available)">
              {{ me.available ? 'En ligne' : 'Hors ligne' }}
            </ion-button>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>

    <ion-segment [(ngModel)]="activeTab" mode="md" class="pm-segment">
      <ion-segment-button value="profile">
        <ion-button>Profil</ion-button>
      </ion-segment-button>
      <ion-segment-button value="photos">
        <ion-button>Photos</ion-button>
      </ion-segment-button>
      <ion-segment-button value="settings">
        <ion-button>Compte</ion-button>
      </ion-segment-button>
    </ion-segment>

    <ion-card class="pm-card ion-no-margin">
      <ion-card-content>

        <div *ngIf="activeTab === 'profile'" class="fade-in">
          <ion-grid class="ion-no-padding">
            <ion-row>

              <ion-col size="12">
                <ion-item lines="none" class="venus-input">
                  <ion-label position="stacked">Description</ion-label>
                  <ion-textarea [(ngModel)]="profileForm.description"
                                [debounce]="500"
                                [autoGrow]="true"
                                (ionChange)="updateProfileField('description', $event.detail.value)"
                                placeholder="Décrivez votre profil, vos spécialités..."></ion-textarea>
                </ion-item>
              </ion-col>

              <ion-col size="12" size-md="6">
                <ion-item lines="none" class="venus-input">
                  <ion-label position="stacked">Localisation</ion-label>
                  <ion-select label="Localisation" label-placement="stacked" interface="popover"
                              [(ngModel)]="profileForm.location"
                              (ionChange)="updateProfileField('location', $event.detail.value)"
                              placeholder="Choisir une ville...">
                    <ion-select-option *ngFor="let region of REGIONS" [value]="region">
                      {{ region }}
                    </ion-select-option>
                  </ion-select>
                </ion-item>
              </ion-col>

              <ion-col size="12" size-md="6">
                <ion-item lines="none" class="venus-input">
                  <ion-label position="stacked">Téléphone</ion-label>
                  <ion-input type="tel"
                             [(ngModel)]="profileForm.phone"
                             [debounce]="500"
                             (ionChange)="updateProfileField('phone', $event.detail.value)"
                             placeholder="Ex: +33 6 12 34 56 78"></ion-input>
                </ion-item>
              </ion-col>

              <ion-col size="12" size-md="6">
                <ion-item lines="none" class="venus-input">
                  <ion-label position="stacked">Silhouette</ion-label>
                  <ion-select label="Silhouette" label-placement="stacked" interface="popover"
                              [(ngModel)]="profileForm.bodyType"
                              (ionChange)="updateProfileField('bodyType', $event.detail.value)"
                              placeholder="Choisir...">
                    <ion-select-option *ngFor="let type of BODY_TYPE_LABELS | keyvalue" [value]="type.key">
                      {{ type.value }}
                    </ion-select-option>
                  </ion-select>
                </ion-item>
              </ion-col>

              <ion-col size="12" size-md="6">
                <ion-item lines="none" class="venus-input">
                  <ion-label position="stacked">Couleur des yeux</ion-label>
                  <ion-select label="Couleur des yeux" label-placement="stacked" interface="popover"
                              [(ngModel)]="profileForm.eyeColor"
                              (ionChange)="updateProfileField('eyeColor', $event.detail.value)"
                              placeholder="Choisir...">
                    <ion-select-option *ngFor="let eye of EYE_COLOR_LABELS | keyvalue" [value]="eye.key">
                      {{ eye.value }}
                    </ion-select-option>
                  </ion-select>
                </ion-item>
              </ion-col>

              <ion-col size="12" size-md="6">
                <ion-item lines="none" class="venus-input">
                  <ion-label position="stacked">Couleur des cheveux</ion-label>
                  <ion-select label="Couleur des cheveux" label-placement="stacked" interface="popover"
                              [(ngModel)]="profileForm.hairColor"
                              (ionChange)="updateProfileField('hairColor', $event.detail.value)"
                              placeholder="Choisir...">
                    <ion-select-option *ngFor="let hair of HAIR_COLOR_LABELS | keyvalue" [value]="hair.key">
                      {{ hair.value }}
                    </ion-select-option>
                  </ion-select>
                </ion-item>
              </ion-col>

              <ion-col size="12">
                <div class="services-container">
                  <ion-list-header class="ion-no-padding">
                    <ion-label>Services proposés</ion-label>
                  </ion-list-header>

                  <div class="services-flex">
                    <ion-checkbox *ngFor="let service of allServices"
                                  [checked]="me.services.includes(service)"
                                  (click)="toggleService(me, service)">
                      <ion-label>{{ service }}</ion-label>
                    </ion-checkbox>
                  </div>
                </div>
              </ion-col>

            </ion-row>
          </ion-grid>
        </div>

        <div *ngIf="activeTab === 'photos'" class="fade-in">
          <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none">

          <ion-button expand="block" (click)="fileInput.click()" class="ion-margin">
            <ion-icon slot="start" name="add-circle-outline"></ion-icon>
            Ajouter une photo
          </ion-button>

          <ion-reorder-group [disabled]="false" (ionItemReorder)="doReorder($event)">
            <ion-grid class="ion-no-padding ion-padding-horizontal">
              <ion-row>
                <ion-col size="4" size-md="3" *ngFor="let photo of me.photos" class="ion-padding-tiny">
                  <div class="gallery-item">
                    <img [src]="photo.previewThumbUrl" class="gallery-img" />
                    <div class="gallery-actions-overlay">
                      <ion-button color="danger" fill="clear" size="small" (click)="deletePhoto(photo)">
                        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                      <ion-reorder>
                        <ion-icon name="move" color="light"></ion-icon>
                      </ion-reorder>
                    </div>
                  </div>
                </ion-col>
              </ion-row>
            </ion-grid>
          </ion-reorder-group>
        </div>

      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
