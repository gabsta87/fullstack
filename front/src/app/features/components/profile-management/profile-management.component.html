<app-header></app-header>

<ion-content class="pm-main-container">

  <div class="pm-wrapper" *ngIf="me">

    <div class="pm-hero-banner">
      <div class="avatar-wrapper">
        <img [src]="me.mainThumbUrl || 'assets/default-avatar.png'" class="profile-pic">
      </div>
      <div class="profile-title">
        <h1>{{ me.username }}</h1>
        <p class="status">{{ me.available ? '● En ligne' : '○ Hors ligne' }}</p>
      </div>
    </div>

    <div class="pm-tabs-nav">
      <div class="tab-item" [class.active]="activeTab === 'profile'" (click)="activeTab = 'profile'">Profil</div>
      <div class="tab-item" [class.active]="activeTab === 'photos'" (click)="activeTab = 'photos'">Photos</div>
    </div>

    <div class="pm-card">
      <div *ngIf="activeTab === 'profile'" class="fade-in">
        <div class="input-group">
          <label>Silhouette</label>
          <select [(ngModel)]="profileForm.bodyType">
            <option *ngFor="let type of bodyTypeOptions">
              {{ type }}
            </option>
          </select>
        </div>

        <div class="input-group">
          <label>Services proposés (depuis DB)</label>
          <div class="services-grid">
            <div *ngFor="let s of allServices | async" class="service-chip">
              <input type="checkbox" [id]="s" [value]="s">
              <label [for]="s">{{ s }}</label>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</ion-content>
