<app-header></app-header>

<ion-content class="pm-main-container">

  <div class="pm-wrapper" *ngIf="currentUser$ | async as me ">

    <ion-grid class="pm-hero-grid ion-no-padding">
      <ion-row class="ion-align-items-center">
        <ion-col size="12" size-md="auto" class="ion-text-center">
          <div class="avatar-wrapper">
            <ion-avatar>
              <img [src]="me.mainThumbUrl || 'assets/default-avatar.png'" />
            </ion-avatar>
            <ion-fab-button size="small" class="edit-photo-btn">
              <ion-icon name="camera"></ion-icon>
            </ion-fab-button>
          </div>
        </ion-col>
        <ion-col size="12" size-md="" class="ion-text-center ion-text-md-start">
          <div class="profile-title">
            <h1>{{ me.username }}</h1>
            <ion-button [color]="me.available ? 'success' : 'medium'" class="status-badge">
              {{ me.available ? 'En ligne' : 'Hors ligne' }}
            </ion-button>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>

    <ion-segment [(ngModel)]="activeTab" mode="md" class="pm-segment">
      <ion-segment-button value="profile">
        <ion-button>Profil</ion-button>
      </ion-segment-button>
      <ion-segment-button value="photos">
        <ion-button>Photos</ion-button>
      </ion-segment-button>
      <ion-segment-button value="settings">
        <ion-button>Compte</ion-button>
      </ion-segment-button>
    </ion-segment>

    <ion-card class="pm-card ion-no-margin">
      <ion-card-content>

        <div *ngIf="activeTab === 'profile'" class="fade-in">
          <ion-grid class="ion-no-padding">
            <ion-row>
              <ion-col size="12" size-md="6">
                <ion-item lines="none" class="venus-input">
                  <ion-label position="stacked">Silhouette</ion-label>
                  <ion-select label="Silhouette" label-placement="stacked" interface="popover" [(ngModel)]="profileForm.bodyType" placeholder="Choisir...">
                    <ion-select-option *ngFor="let type of BODY_TYPE_LABELS | keyvalue" [value]="type.key">
                      {{ type.value }}
                    </ion-select-option>
                  </ion-select>
                </ion-item>
              </ion-col>

              <ion-col size="12" size-md="6">
                <ion-item lines="none" class="venus-input">
                  <ion-label position="stacked">Localisation</ion-label>
                  <ion-input type="text" [(ngModel)]="profileForm.location" placeholder="Ex: Paris 8e"></ion-input>
                </ion-item>
              </ion-col>

              <ion-col size="12">
                <div class="services-container">
                  <ion-list-header class="ion-no-padding">
                    <ion-label>Services proposés</ion-label>
                  </ion-list-header>

                  <div class="services-flex">
                    <ion-checkbox *ngFor="let service of allServices"
                              [checked]="me.services.includes(service)"
                              (click)="toggleService(me, service)">
                      <ion-label>{{ service }}</ion-label>
                    </ion-checkbox>
                  </div>
                </div>
              </ion-col>
            </ion-row>
          </ion-grid>
        </div>

        <div *ngIf="activeTab === 'photos'" class="fade-in">
          <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none">

          <ion-button expand="block" (click)="fileInput.click()" class="ion-margin">
            <ion-icon slot="start" name="add-circle-outline"></ion-icon>
            Ajouter une photo
          </ion-button>

          <ion-reorder-group [disabled]="false" (ionItemReorder)="doReorder($event)">
            <ion-grid>
              <ion-row>
                <ion-col size="6" size-md="4" *ngFor="let photo of photos">
                  <ion-item lines="none">
                    <ion-thumbnail slot="start">
                      <img [src]="photo.previewThumbUrl" />
                    </ion-thumbnail>
                    <ion-reorder slot="end"></ion-reorder>
                  </ion-item>
                </ion-col>
              </ion-row>
            </ion-grid>
          </ion-reorder-group>
        </div>

      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
