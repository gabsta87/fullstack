<app-header></app-header>

<ion-header class="ion-no-border profile-header-bar">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" text="Retour"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="profile-content">
  <div class="profile-wrap" *ngIf="worker">
    <div class="layout fade-in">

      <aside class="sidebar">
        <div class="profile-card">
          <img [src]="worker.mainThumbUrl" alt="Avatar" class="avatar-img">
          <h2>{{ worker.username }}</h2>
          <p class="location"><ion-icon name="location-outline"></ion-icon> {{ worker.location }}</p>
        </div>

        <div class="profile-card actions-card">
          <ion-button expand="block" color="primary">Contacter</ion-button>

          <ion-button expand="block" fill="outline" color="medium" (click)="toggleFavorite()">
            <ion-icon slot="start" [name]="isFavorite ? 'heart' : 'heart-outline'"></ion-icon>
            Favoris
          </ion-button>

          <ion-button expand="block" fill="outline" color="medium" (click)="toggleNotify()">
            <ion-icon slot="start" [name]="notifyEnabled ? 'notifications' : 'notifications-outline'"></ion-icon>
            Me notifier son retour
          </ion-button>
        </div>

        <div class="profile-card">
          <ion-list lines="none">
            <ion-item>
              <ion-icon name="body-outline" slot="start"></ion-icon>
              <ion-label>Silhouette : {{ worker.bodyType }}</ion-label>
            </ion-item>
            <ion-item>
              <ion-icon name="woman-outline" slot="start"></ion-icon>
              <ion-label>Age : {{ worker.age }}</ion-label>
            </ion-item>
          </ion-list>
        </div>
      </aside>

      <main class="main-content">

        <div class="profile-card">
          <h3>Galerie</h3>
          <div class="gallery-grid">
            <img *ngFor="let p of worker.photos; let i = index"
                 [src]="p.previewThumbUrl" (click)="openPhoto(i)">
          </div>
        </div>

        <div class="profile-card ion-margin-top">
          <h3>À propos</h3>
          <p>{{ worker.description }}</p>

          <div class="chips-group ion-margin-top">
            <ion-chip *ngFor="let s of worker.services">
              <ion-label>{{ s }}</ion-label>
            </ion-chip>
          </div>
        </div>

        <div *ngIf="worker.reviews" class="profile-card ion-margin-top">
          <h3>Avis ({{ worker.reviews.length }})</h3>
        </div>
      </main>

    </div>
  </div>
</ion-content>
