<!-- ░░ DEV BAR (remove before go-live) ░░ -->
<div class="dev-bar">
  <span class="dev-label">🛠 Dev</span>
  <a routerLink="/ngx-pay">NGX Pay</a>
</div>

<app-header></app-header>

<!-- ░░ IONIC CONTENT ░░ -->
<ion-content class="main-content">
  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-grid>
    <section *ngIf="availableWorkers.length > 0">
      <div class="section-label">
        <span class="pip online"></span>
        Disponibles maintenant ({{ availableWorkers.length }})
      </div>

      <ion-row>
        <ion-col size="12" size-sm="6" size-md="4" size-lg="3" size-xl="2"
                 *ngFor="let w of availableWorkers; let i = index">
          <app-worker-card [worker]="w"></app-worker-card>
        </ion-col>
      </ion-row>
    </section>

    <section *ngIf="unavailableWorkers.length > 0" class="ion-margin-top">
      <div class="section-label">
        <span class="pip offline"></span>
        Non disponibles ({{ unavailableWorkers.length }})
      </div>

      <ion-row class="faded">
        <ion-col size="12" size-sm="6" size-md="4" size-lg="3" size-xl="2"
                 *ngFor="let w of unavailableWorkers">
          <app-worker-card [worker]="w"></app-worker-card>
        </ion-col>
      </ion-row>
    </section>
  </ion-grid>

  <!-- Infinite scroll -->
  <ion-infinite-scroll threshold="300px" (ionInfinite)="onIonInfinite($event)">
    <ion-infinite-scroll-content
      loadingSpinner="crescent"
      loadingText="Chargement...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
