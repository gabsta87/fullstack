<app-header></app-header>

<ion-content class="main-content">
  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="filter-banner">
    <ion-grid class="ion-no-padding">
      <ion-row class="ion-align-items-center">

        <ion-col size="12" size-sm="3" size-md="3" class="filter-col">
          <ion-item lines="none" class="filter-input-item">
            <ion-icon name="location-outline" slot="start" class="filter-icon"></ion-icon>
            <ion-select aria-label="Zone Supérieure" interface="popover"
                        [(ngModel)]="parentZoneId"
                        (ionChange)="onParentZoneChange()"
                        placeholder="Toutes les régions">
              <ion-select-option [value]="undefined">Toutes les régions</ion-select-option>
              <ion-select-option *ngFor="let zone of parentZones" [value]="zone.id">
                {{ zone.name }}
              </ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>

        <ion-col size="12" size-sm="3" size-md="3" class="filter-col">
          <ion-item lines="none" class="filter-input-item" [disabled]="!parentZoneId">
            <ion-icon name="business-outline" slot="start" class="filter-icon"></ion-icon>
            <ion-select aria-label="Zone Inférieure" interface="popover"
                        [(ngModel)]="childZoneId"
                        (ionChange)="applyFilters()"
                        placeholder="Toutes les localisations">
              <ion-select-option [value]="undefined">Toutes les localisations</ion-select-option>
              <ion-select-option *ngFor="let subZone of availableChildZones" [value]="subZone.id">
                {{ subZone.name }}
              </ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>

        <ion-col size="12" size-sm="3" size-md="3" class="filter-col">
          <ion-item lines="none" class="filter-input-item">
            <ion-icon name="person-outline" slot="start" class="filter-icon"></ion-icon>
            <ion-input aria-label="Nom"
                placeholder="Nom..."
                [value]="filters.username || ''"
                (ionInput)="onSearchInput($event)"
                (keyup.enter)="applyFilters()">
            </ion-input>
          </ion-item>
        </ion-col>

        <ion-col size="12" size-sm="3" size-md="3" class="filter-actions ion-text-end">
          <ion-button *ngIf="hasActiveFilters()"
                      fill="outline" class="more-filters-btn"
                      color="medium"
                      size="small"
                      (click)="clearFilters()">
            Effacer
          </ion-button>

          <ion-button fill="outline" class="more-filters-btn" (click)="toggleMoreFilters()">
            <ion-icon slot="start" [name]="showMoreFilters ? 'close-outline' : 'options-outline'"></ion-icon>
            Filtres
          </ion-button>
        </ion-col>

      </ion-row>

      <ion-row *ngIf="showMoreFilters" class="advanced-filters-row fade-in">
        <ion-col size="12" size-sm="4">
          <ion-item lines="none" class="filter-input-item">
            <ion-select aria-label="Silhouette" interface="popover"
                        [(ngModel)]="filters.bodyType"
                        (ionChange)="applyFilters()"
                        placeholder="Toutes les silhouettes">
              <ion-select-option [value]="null">Toutes les silhouettes</ion-select-option>
              <ion-select-option *ngFor="let type of BODY_TYPE_LABELS | keyvalue" [value]="type.key">
                {{ type.value }}
              </ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>

        <ion-col size="12" size-sm="4">
          <ion-item lines="none" class="filter-input-item">
            <ion-select aria-label="Yeux" interface="popover"
                        [(ngModel)]="filters.eyeColor"
                        (ionChange)="applyFilters()"
                        placeholder="Toutes les couleurs d'yeux">
              <ion-select-option [value]="null">Toutes les couleurs d'yeux</ion-select-option>
              <ion-select-option *ngFor="let eye of EYE_COLOR_LABELS | keyvalue" [value]="eye.key">
                {{ eye.value }}
              </ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>

        <ion-col size="12" size-sm="4">
          <ion-item lines="none" class="filter-input-item">
            <ion-select aria-label="Cheveux" interface="popover"
                        [(ngModel)]="filters.hairColor"
                        (ionChange)="applyFilters()"
                        placeholder="Toutes les couleurs de cheveux">
              <ion-select-option [value]="null">Toutes les couleurs de cheveux</ion-select-option>
              <ion-select-option *ngFor="let hair of HAIR_COLOR_LABELS | keyvalue" [value]="hair.key">
                {{ hair.value }}
              </ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <ion-grid>
    <section *ngIf="allWorkers.length > 0">
      <ion-row>
        <ion-col size="12" size-sm="6" size-md="4" size-lg="3" size-xl="2"
                 *ngFor="let w of allWorkers">
          <app-worker-card [worker]="w" [class.faded]="!w.available"></app-worker-card>
        </ion-col>
      </ion-row>
    </section>
  </ion-grid>

  <ion-infinite-scroll threshold="50px" (ionInfinite)="onIonInfinite($event)" [disabled]="noMoreData">
    <ion-infinite-scroll-content loadingSpinner="crescent" loadingText="Chargement..."></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
