spring.config.import = optional:secrets.properties

spring.profiles.active=dev
spring.jpa.open-in-view=false

server.port=8080
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Uncomment to create the database
#spring.jpa.hibernate.ddl-auto=create

# ?? Media Storage ?????????????????????????????????????????????????????????????

# Absolute path to the root folder where all media is stored on disk.
# Nginx will serve this directory directly (see nginx.conf).
# Windows dev example : media.upload.base=C:/serv-media
# Linux prod example  : media.upload.base=/var/serv-media
media.upload.base=/var/serv-media

# The public URL prefix that Nginx exposes for the media directory.
# During development you can point this at a local Nginx instance
# or temporarily at Spring's own static serving (see DevMediaController).
# Production example : media.public.base-url=https://yourdomain.com/media
# Dev example        : media.public.base-url=http://localhost:8081/media
media.public.base-url=http://localhost:8081/media

# ?? File size limits (Spring multipart) ???????????????????????????????????????
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=520MB

# Directory to store uploaded files
# ?? Old single-upload dir (keep until migration is done, then remove) ?????????
image.upload.dir=uploads/worker_photos
video.upload.dir=uploads/worker_videos
