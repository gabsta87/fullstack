name: Deploy Venus Project

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        env:
          DOCKER_API_VERSION: "1.43"
        run: docker-compose up -d --build --remove-orphans
                  
      - name: Cleanup old images
        run: docker image prune -f
