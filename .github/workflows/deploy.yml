name: Deploy Venus Project

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          docker-compose up --build -d --remove-orphans
          
      - name: Cleanup old images
        run: |
          # Supprime les images "dangling" (les anciens builds inutiles)
          docker image prune -f
