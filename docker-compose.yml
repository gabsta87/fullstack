services:
  db:
    image: mysql:9.0
    container_name: venus-db
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}" ]
      interval: 20s
      timeout: 20s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build: ./serv
    container_name: venus-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      
      # Configuration pour la stabilité au démarrage
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_TESTONBORROW: "true"
      SPRING_DATASOURCE_VALIDATIONQUERY: "SELECT 1"
      
      # HikariCP : ne pas crasher si la DB est lente à répondre
      SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT: "60000"
      SPRING_DATASOURCE_HIKARI_INITIALIZATIONFAILTIMEOUT: "60000"
      SPRING_JPA_PROPERTIES_HIBERNATE_CONNECTION_TIMEOUT: "60000"
      
      # Mémoire
      JAVA_OPTS: "-Xms512m -Xmx1024m"
      
    volumes:
      - media-data:/var/serv-media
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure:5
    deploy:
      resources:
        limits:
          memory: 1.5G

  frontend:
    build: ./front
    container_name: venus-frontend
    ports:
      - "8888:80"
    depends_on:
      - backend

volumes:
  db-data:
  media-data: