# docker-compose.yml
services:

  db:
    image: mysql:9.0
    container_name: venus-db
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s   # ← give MySQL time to initialize before first check

  backend:
    build: ./serv
    dns:
      - 8.8.8.8
      - 1.1.1.1
    container_name: venus-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - media-data:/var/serv-media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./front
    container_name: venus-frontend
    ports:
      - "8888:80"
    depends_on:
      - backend

  adminer:
    image: adminer
    container_name: venus-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  db-data:
  media-data: